<button
  class="theme-toggle"
  type="button"
  [attr.aria-pressed]="theme.mode() === 'dark'"
  (click)="theme.toggle()">
  @if (theme.mode() === 'dark') {
    Light
  } @else {
    Dark
  }
</button>

@if (toastService.toast(); as toast) {
  <div
    class="toast toast-{{ toast.kind }}"
    [attr.role]="toast.kind === 'error' ? 'alert' : 'status'"
    [attr.aria-live]="toast.kind === 'error' ? 'assertive' : 'polite'">
    {{ toast.message }}
  </div>
}

<router-outlet></router-outlet>
