<main class="login-page">
  <section class="login-panel" aria-labelledby="login-title">
    <div class="login-copy">
      <p class="eyebrow">ShareCare</p>
      <h1 id="login-title">Welcome back</h1>
      <p>Sign in to manage campaigns and continue supporting the causes that matter.</p>
    </div>

    <form (ngSubmit)="login()" class="login-form">
      <div class="form-field">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          name="username"
          autocomplete="username"
          required
          [(ngModel)]="loginRequest.username"
        />
      </div>

      <div class="form-field">
        <label for="password">Password</label>
        <div class="password-field">
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            name="password"
            autocomplete="current-password"
            required
            [(ngModel)]="loginRequest.password"
          />

          <button
            class="password-toggle"
            type="button"
            [attr.aria-pressed]="showPassword()"
            [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
            (click)="togglePasswordVisibility()">
            {{ showPassword() ? 'Hide' : 'Show' }}
          </button>
        </div>
      </div>

      <button type="submit">Login</button>

      <div class="auth-switch">
        <span>Don't have an account?</span>
        <a routerLink="/register" class="auth-link">Register</a>
      </div>

      <div class="auth-switch">
        <span>Didn't verify your email?</span>
        <a routerLink="/resend-verification-email" class="auth-link">Resend verification email</a>
      </div>

      <div class="auth-switch">
        <span>Forgot your password?</span>
        <a routerLink="/forgot-password" class="auth-link">Reset password</a>
      </div>
    </form>
  </section>
</main>
