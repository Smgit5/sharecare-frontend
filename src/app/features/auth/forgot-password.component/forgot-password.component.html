<main class="forgot-page">
  <section class="forgot-panel" aria-labelledby="forgot-title">
    <div class="forgot-copy">
      <p class="eyebrow">ShareCare</p>
      <h1 id="forgot-title">{{ title() }}</h1>
      <p>{{ message() }}</p>
    </div>

    <form (ngSubmit)="forgotPassword()" class="forgot-form">
      <div class="form-field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          name="email"
          autocomplete="email"
          required
          [(ngModel)]="email"
        />
      </div>

      <button type="submit" [disabled]="!canSubmit()">
        {{ isSubmitting() ? 'Sending...' : 'Send password reset link' }}
      </button>

      <div class="auth-switch">
        <span>Remembered your password?</span>
        <button type="button" routerLink="/login">Back to login</button>
      </div>
    </form>
  </section>
</main>
